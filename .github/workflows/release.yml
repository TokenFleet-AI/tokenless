name: Release

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      prerelease:
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v0.1.0)"
        required: true
      prerelease:
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            features: ""  # ort no prebuilt for x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            features: ""  # Xcode 16.4 clang_rt.osx broken; build ONNX version locally
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            features: "--features tokenless-semantic/onnx"
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            musl: true
            features: ""  # ort no prebuilt for musl
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            features: "--features tokenless-semantic/onnx"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Pin Xcode (avoid broken clang_rt.osx on latest)
        if: runner.os == 'macOS'
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - uses: dtolnay/rust-toolchain@stable

      - name: Install target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.musl
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../tokenless-${{ matrix.target }}.${{ matrix.archive }} tokenless
          cd ../../..

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../tokenless-${{ matrix.target }}.${{ matrix.archive }} tokenless.exe
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: tokenless-${{ matrix.target }}
          path: tokenless-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -name "*.tar.gz" -o -name "*.zip" | while read f; do cp "$f" release/; done

      - name: Checksums
        run: |
          cd release
          sha256sum * > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: release/*
          prerelease: ${{ inputs.prerelease }}
