name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Pin Xcode (avoid broken clang_rt.osx in Xcode 16.4)
        if: runner.os == 'macOS'
        run: |
          # Xcode 16.4 ships with a broken clang_rt.osx search path.
          # Find the latest Xcode that still has the compiler-rt library.
          for xcode in /Applications/Xcode_*.app; do
            version=$(basename "$xcode" .app | sed 's/Xcode_//')
            libdir="$xcode/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/clang/"*
            if ls "$libdir"/lib/darwin/libclang_rt.osx.a 2>/dev/null; then
              echo "Using Xcode $version (has clang_rt.osx)"
              sudo xcode-select -s "$xcode/Contents/Developer"
              exit 0
            fi
          done
          echo "No Xcode with clang_rt.osx found; listing available:"
          ls -d /Applications/Xcode_*.app

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Build
        run: cargo build --release --workspace --features tokenless-semantic/onnx

      - name: Test
        env:
          INSTA_UPDATE: always
        run: cargo test --workspace --features tokenless-semantic/onnx

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::pedantic

      - name: Format
        run: cargo fmt --check

      - name: Typos
        if: runner.os == 'Linux'
        uses: crate-ci/typos@master

      - name: Check agent sync
        if: runner.os == 'Linux'
        run: make check-agent-sync

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info --summary-only

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

      - name: Enforce non-decreasing PR diff coverage
        if: github.event_name == 'pull_request'
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: lcov.info
          min_coverage: 0
          diff_base: ${{ github.event.pull_request.base.sha }}
          diff_head: ${{ github.event.pull_request.head.sha }}
          update_comment: true
          fail_below_threshold: true

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Dependency license & source audit
        run: cargo deny check

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Vulnerability audit
        run: cargo audit

      - name: Detect secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v1
        with:
          args: detect --source . --verbose

  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Parse MSRV from Cargo.toml
        id: msrv
        run: |
          version=$(grep 'rust-version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${version:-1.89.0}" >> $GITHUB_OUTPUT

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ steps.msrv.outputs.version }}

      - name: Check MSRV compatibility
        run: cargo check --workspace --all-targets --all-features
