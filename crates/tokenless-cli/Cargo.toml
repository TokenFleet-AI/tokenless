[package]
name = "tokenless"
description = "LLM token optimization CLI — schema/response compression, command rewriting, TOON encoding"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
keywords = ["llm", "token", "compression", "cli", "openai"]
categories = ["development-tools", "command-line-utilities"]

[[bin]]
name = "tokenless"
path = "src/main.rs"

[dependencies]
tokenless-schema = { path = "../tokenless-schema", version = "0.1.0" }
tokenless-stats = { path = "../tokenless-stats", version = "0.1.0" }
clap = { workspace = true, features = ["derive"] }
chrono = { workspace = true, features = ["serde"] }
serde_json.workspace = true
toon-format.workspace = true
rusqlite.workspace = true
dirs.workspace = true
rtk-registry.workspace = true

[lints]
workspace = true
