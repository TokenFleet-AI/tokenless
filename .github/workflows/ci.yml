name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Build
        run: cargo build --release --workspace

      - name: Test
        env:
          INSTA_UPDATE: always
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::pedantic

      - name: Format
        run: cargo fmt --check

      - name: Typos
        if: runner.os == 'Linux'
        uses: crate-ci/typos@master

      - name: Check agent sync
        if: runner.os == 'Linux'
        run: make check-agent-sync

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Dependency license & source audit
        run: cargo deny check

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Vulnerability audit
        run: cargo audit

      - name: Detect secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v1
        with:
          args: detect --source . --verbose

  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Parse MSRV from Cargo.toml
        id: msrv
        run: |
          version=$(grep 'rust-version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${version:-1.89.0}" >> $GITHUB_OUTPUT

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ steps.msrv.outputs.version }}

      - name: Check MSRV compatibility
        run: cargo check --workspace --all-targets --all-features
